<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <nav>
      <h1>Administration</h1>
      <ul>
        <li><a href="/">Accueil</a></li>
        <li><button onclick="logout()">Déconnexion</button></li>
      </ul>
    </nav>
  </header>

  <section class="section">
    <h2 class="section-title">Ajouter un plat</h2>
    <div class="form-container">
      <form id="admin-plat-form">
        <input type="text" id="plat-nom" placeholder="Nom du plat" required />
        <textarea id="plat-description" placeholder="Description"></textarea>
        <input type="text" id="plat-citation" placeholder="Citation" />
        <input type="number" step="0.01" id="plat-prix" placeholder="Prix" required />
        <input type="text" id="plat-image" placeholder="Chemin image ex: images/batbout.jpg" />
        <select id="plat-categorie" required>
          <option value="">Choisir une catégorie</option>
          <option value="sucré">Sucré</option>
          <option value="salé">Salé</option>
        </select>
        <button class="btn" type="submit">Ajouter</button>
      </form>
      <div id="admin-plat-message" class="message-box"></div>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title">Demandes clients</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Plat</th>
            <th>Quantité</th>
            <th>Date souhaitée</th>
            <th>Message</th>
            <th>Créée le</th>
          </tr>
        </thead>
        <tbody id="admin-demandes-body"></tbody>
      </table>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
