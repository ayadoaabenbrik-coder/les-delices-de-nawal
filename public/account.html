<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon compte</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <nav>
      <h1>Les Délices Marocains</h1>
      <ul>
        <li><a href="/">Accueil</a></li>
        <li><button onclick="logout()">Déconnexion</button></li>
      </ul>
    </nav>
  </header>

  <section class="section">
    <h2 class="section-title">Mon espace</h2>
    <p class="center">Bienvenue <strong id="account-name"></strong></p>
  </section>

  <section class="section">
    <h2 class="section-title">Mes demandes</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Plat</th>
            <th>Quantité</th>
            <th>Date souhaitée</th>
            <th>Message</th>
            <th>Statut</th>
            <th>Créée le</th>
          </tr>
        </thead>
        <tbody id="demandes-body"></tbody>
      </table>
    </div>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
